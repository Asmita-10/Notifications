
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Pastel Notifications</title>
            <link rel="stylesheet" href="style.css">
            <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
        </head>
        <body>
        
            <!-- Corner decorative images -->
            <div class="corner-images">
                <img class="img-tl" src="https://i.pinimg.com/736x/0a/e9/b9/0ae9b9dbb5e2a599f7941ad9341ac135.jpg" alt="">
                <img class="img-tr" src="https://i.pinimg.com/736x/84/16/3b/84163be9f825b66d38916c00634df9f1.jpg" alt="">
                <img class="img-bl" src="https://i.pinimg.com/736x/62/94/e5/6294e585402e865a02717f7b220b3ff0.jpg" alt="">
                <img class="img-br" src="https://i.pinimg.com/736x/4a/1b/83/4a1b830e87a99783e39adff30b3ed70d.jpg" alt="">
            </div>
        
            <div class="main-container">
                <div class="greeting-bar">
                    <div class="greeting-left">
                        <div class="avatar-sm">A</div>
                        <div class="greeting-text">
                            <p>Good morning ☀️</p>
                            <strong>Asmita</strong>
                        </div>
                    </div>
                </div>
         
                <header class="page-header">
                    <p class="eyebrow">Your updates, at a glance</p>
                    <h1>Notifications</h1>
                </header>
        
                <div class="card">
                    <button id="trigger-btn">
                        <span class="btn-icon">🔔</span>
                        Show Notifications
                    </button>
        
                    <div class="output">
                        <div id="message-container"></div>
                    </div>
                </div>
        
            </div>
        
            <script src="script.js"></script>
        </body>
        </html>
